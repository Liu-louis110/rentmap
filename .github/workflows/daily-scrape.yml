name: Daily Data Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install lxml
      - name: Run scraper
        env:
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
        run: python lianjia_scraper.py
      - name: Commit updated data
        run: |
          git config user.name "rentmap-bot"
          git config user.email "bot@rentmap.app"
          git add src/data/mockData.ts
          git diff --cached --quiet || git commit -m "chore: auto-update rental data $(date +'%Y-%m-%d')"
          git push
